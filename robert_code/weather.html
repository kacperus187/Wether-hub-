<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <div class="tocenter">
            <div class="maincontent">
                <div class="label">Wetter<span style="margin-left: 3px; padding:5px 5px; background-color: orange; border-radius: 8px;">hub</span></div>
                <br>
                <br>
                <br>
                <div id="idTime" class="divTime">22:10</div>
                <div class="area1">
                    <div id="idDate" class="divDate">Freitag, 12.06.2026</div>
                    <div id="temp">100° C</div>
                    <div id="arrowtemp" style="display: contents;"> <span style="color:green;">▲</span></div>
                </div>
                <br>
                <br>
                <p class="infotext">🛈 Luftfeuchtigkeit liegt bei 
                    <span id="feuchtigkeit">0</span>
                    % 
                    <span id="arrowluftfeuchtgkeit"></span>
                    <br>🛈 
                    <span id="co2">
                        Luftqualität wird hier stehen
                    </span>
                </p>
                <br>
                <button id="connect">Mit Arduino verbinden</button>
            </div>
        </div>
        
        
        <script>
            let port;
            let reader;

            let timeCounter = 0;
            let timeCounterMax = 5;
            // let isTimeCounterResetNeeded = false;
            let htmlValueIncreased = "<span style='color:green;'>▲</span>";
            let htmlValueDecreased = "<span style='color:red;'>▼</span>";

            let lastKnownValues = {
                "temp": 0,
                "co2": 0,
                "feuchtigkeit": 0
            };


            let weekDays =
            [
                "Sonntag",
                "Montag",
                "Dienstag",
                "Mittwoch",
                "Donnerstag",
                "Freitag",
                "Samstag"
            ];

            function leadWithZeroDateTime(stringToCheck) {
                return stringToCheck > 9 ? stringToCheck : "0" + stringToCheck;
            }

            function getCo2Text(intValueToCheck) {
                var textToReturn = "Es ist außergewöhnlich wenig CO2 in der Luft";

                if(intValueToCheck >= 2000) {
                    return "Die Luftqualität ist sehr schlecht!";
                } else if(intValueToCheck >= 1500) {
                    return "Die Luftqualität ist schlecht";
                } else if(intValueToCheck >= 1000) {
                    return "Die Luftqualität könnte besser sein";
                } else if(intValueToCheck >= 900) {
                    return "Die Luftqualität ist gut";
                } else if(intValueToCheck >= 500) {
                    return "Die Luftqualität ist sehr gut!";
                }

                return textToReturn;
            }

            function isValueBelowEqualAbove(strIndex, intValue) {
                // console.log(lastKnownValues);
                if (intValue > lastKnownValues[strIndex]) {
                    // console.log("Value has increased");
                    return "+";
                } else if(intValue == lastKnownValues[strIndex]) {
                    return "=";
                } else if(intValue < lastKnownValues[strIndex]) {
                    // console.log("Value has decreased");
                    return "-";
                }
                return 1;
            }

            function timerCheckChangingValue() {
                // if(timeCounter >= timeCounterMax) {
                //     timeCounter = 0;
                //     isTimeCounterResetNeeded = true;
                // }
                timeCounter++;
            }

            async function connectSerial() {
                try {
                    document.getElementById("connect").remove();
                    port = await navigator.serial.requestPort();

                    await port.open({
                        baudRate: 9600
                    });

                    console.log("Port opened");

                    await new Promise(r => setTimeout(r, 5000));
                    const decoder = new TextDecoderStream();
                    port.readable.pipeTo(decoder.writable);
                    reader = decoder.readable.getReader();

                    let buffer = "";

                    while(true) {
                        const { value, done } = await reader.read();
                        if (done) {
                            break;
                        }

                        if(value) {
                            // if(timeCounter >= timeCounterMax) {
                            //     timeCounter = 0;
                            //     isTimeCounterResetNeeded = true;
                            // }
                            buffer += value;

                            let lines = buffer.split("\n");
                            buffer = lines.pop();

                            for(let line of lines) {
                                line = line.trim();
                                console.log(line);
                                if(line.length > 0) {
                                    var arrowTempString = "";
                                    const parts = line.split("__");

                                    var hasValueChanged = "";

                                    hasValueChanged = isValueBelowEqualAbove("temp", parts[1]);
                                    switch(hasValueChanged) {
                                        case 1: break;
                                        case "=": break;
                                        case "+":
                                            arrowTempString = htmlValueIncreased;
                                            break;
                                        case "-":
                                            arrowTempString = htmlValueDecreased;
                                            break;  
                                    }

                                    var arrowFeuchtigkeitString = "";

                                    hasValueChanged = isValueBelowEqualAbove("feuchtigkeit", parts[2]);
                                    switch(hasValueChanged) {
                                        case 1: break;
                                        case "=": break;
                                        case "+":
                                            arrowFeuchtigkeitString = htmlValueIncreased;
                                            break;
                                        case "-":
                                            arrowFeuchtigkeitString = htmlValueDecreased;
                                            break;  
                                    }

                                    document.getElementById("temp").innerHTML = parts[1] + "° C";
                                    // document.getElementById("temp").innerHTML += arrowTempString; 
                                    document.getElementById("arrowtemp").innerHTML = arrowTempString

                                    document.getElementById("feuchtigkeit").innerHTML = parts[2];
                                    document.getElementById("arrowluftfeuchtgkeit").innerHTML = arrowFeuchtigkeitString;

                                    var co2text = getCo2Text(parts[3]);
                                    document.getElementById("co2").innerHTML = co2text;

                                    // if(isTimeCounterResetNeeded) {
                                    if(timeCounter >= timeCounterMax) {
                                        // isTimeCounterResetNeeded = false;
                                        lastKnownValues["temp"] = parts[1];
                                        lastKnownValues["feuchtigkeit"] = parts[2];
                                        lastKnownValues["co2"] = parts[3];
                                        timeCounter = 0;
                                        // console.log("Timer reset done");
                                    }
                                }
                            }
                        }
                    }
                } catch(err) {
                    console.error(err);
                }
            }

            function getSetDatetime() {
                var dateTime = new Date();
                var hourString = leadWithZeroDateTime(dateTime.getHours());
                var minutesString = leadWithZeroDateTime(dateTime.getMinutes());
                var secondsString = leadWithZeroDateTime(dateTime.getSeconds());
                var timeString = hourString + ":" + minutesString + ":" + secondsString;
                // var timeString = hourString + ":" + minutesString

                var currDate = weekDays[dateTime.getDay()] + ", " + leadWithZeroDateTime(dateTime.getDate()) + "." + leadWithZeroDateTime(dateTime.getMonth()+1) + "." + leadWithZeroDateTime(dateTime.getFullYear());
                
                document.getElementById("idTime").innerHTML = timeString;
                document.getElementById("idDate").innerHTML = currDate;
            }
            document.getElementById("connect").onclick = connectSerial;
            getSetDatetime();
            setInterval(getSetDatetime, 1000);
            setInterval(timerCheckChangingValue, 1000);

        </script>





        <style>

            }
